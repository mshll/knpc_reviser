                      - paragraph [ref=f3e465]: 198.23.16.0 has first octet 198, which is in 192-223, so it is Class C with a default mask of /24 (24 network bits). The given mask 255.255.255.252 has last octet 1111 1100 = /30, so borrowed bits = 30 - 24 = 6, giving 2^6 = 64 subnets. Host bits = 32 - 30 = 2, so 2^2 - 2 = 2 usable hosts per subnet (the classic point-to-point /30). The trap is forgetting the -2 for the network and broadcast addresses, which would give 4 hosts.
