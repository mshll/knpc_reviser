                      - paragraph [ref=f3e983]: 1110 0000 = 224 and 1100 0000 = 192, so 224 + 192 = 416 = 1 1010 0000. The 8-bit result is 1010 0000 with a 1 carried out of the MSB, which is the overflow bit the question is asking for. Note the carry-out signals unsigned overflow only; read as two's complement it is -32 + -64 = -96, which fits in 8 bits, so there is no signed overflow.
